version: '3.8'

services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=task_planner_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1650914
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: >
      bash -c "python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=task_planner_db
      - DB_USER=postgres
      - DB_PASSWORD=1650914
      - DB_HOST=db
      - DB_PORT=5432

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: